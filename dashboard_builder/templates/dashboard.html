{% extends "base.html" %}
{% block content %}
<section class="kpi-grid">
  {% for k in data.kpis %}
  <div class="kpi">
    <div class="kpi-label">{{ k.label }}</div>
    <div class="kpi-value">{{ k.value }}</div>
    <div class="kpi-delta {{ 'up' if k.positive else 'down' }}">{{ k.delta }}</div>
  </div>
  {% endfor %}
</section>

{% for c in data.charts %}
<section class="chart-block">
  <div class="chart-level">{{ c.level }}</div>
  <div class="chart">{{ c.html|safe }}</div>
  <div class="narrative">{{ c.narrative|safe }}</div>
</section>
{% endfor %}
{% endblock %}
